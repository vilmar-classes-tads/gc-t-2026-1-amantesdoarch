name: Java CI com Maven (Fluxo por Features)

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar o JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Compilar e Executar Testes com o Maven
      run: ./mvnw clean test # Alterado de compile para test

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar o JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Compilar o projeto com o Maven
      run: ./mvnw clean package

    - name: Construir a imagem Docker
      run: docker build -t sistema-editais:latest .

    - name: Inicia o container docker
      run: docker run sistema-editais:latest